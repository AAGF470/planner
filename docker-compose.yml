version: '3.8'

services:
  planner:
    build: .
    container_name: cryark-planner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persists data.json outside the container so it survives rebuilds
      - ./data.json:/app/data.json
    environment:
      - PORT=3000
      - NODE_ENV=production

# Point planner.cryark.net → localhost:3000 in your Hostinger reverse proxy / nginx config
# Nginx example:
#   server {
#     listen 80;
#     server_name planner.cryark.net;
#     location / {
#       proxy_pass http://localhost:3000;
#       proxy_http_version 1.1;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection 'upgrade';
#       proxy_set_header Host $host;
#       proxy_cache_bypass $http_upgrade;
#     }
#   }
